<!doctype html>
<html lang="ckb" dir="rtl">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>سێریا ئەی — پەیوەندی</title>
  <link rel="icon" href="assets/img/seriaa.jpeg">
  <link rel="stylesheet" href="assets/style.css">
</head>

<body>
  <main class="container">
    <section class="hero">
      <h1>پەیوەندی</h1>
      <p>پەیوەندیمان پێوە بکە و زیاتر ببینە لەڕێی ئەمانەوە</p>
    </section>

    <div class="grid cols-3">
      <a class="card" id="fb-card" href="#" target="_blank" style="text-align:center;text-decoration:none">
        <div
          style="width:64px;height:64px;margin:0 auto 12px;border-radius:50%;background:#1877f2;display:grid;place-items:center;color:#fff;font-size:32px;font-weight:900">
          f</div>
        <h3>فەیسبووک</h3>
        <div class="meta" id="fb-handle">@seriaay</div>
      </a>

      <a class="card" id="mail-card" href="#" style="text-align:center;text-decoration:none">
        <div
          style="width:64px;height:64px;margin:0 auto 12px;border-radius:50%;background:var(--ink);display:grid;place-items:center;color:#fff;font-size:30px">
          ✉️</div>
        <h3>ئیمەیڵ</h3>
        <div class="meta" id="mail-addr">contact@seriaay.com</div>
      </a>

      <div class="card" style="text-align:center">
        <div
          style="width:64px;height:64px;margin:0 auto 12px;border-radius:50%;background:#ce2b37;display:grid;place-items:center;color:#fff;font-size:28px">
          📍</div>
        <h3>شوێن</h3>
        <div class="meta" id="loc-text">هەولێر — کوردستان</div>
      </div>
    </div>
  </main>

  <script src="assets/firebase-config.js"></script>
  <script src="assets/data.js"></script>
  <script src="assets/script.js"></script>
  <script src="assets/admin.js"></script>
  <script>
    SAApp.init("contact").then(() => {
    if (window.SA_isAdmin) {
      document.querySelector(".hero").insertAdjacentHTML("afterend",
        `<div style="margin:14px 0"><button class="btn" id="edit-contact">✎ دەستکاری زانیاری پەیوەندی</button></div>`);
      document.getElementById("edit-contact").addEventListener("click", () => {
        const c = window.SA.contact;
        SAApp.openGenericModal("دەستکاری پەیوەندی", `
      <form id="cf">
        <label style="font-weight:700">بەستەری فەیسبووک</label>
        <input name="facebook" value="${c.facebook}" style="width:100%;padding:10px;margin:4px 0 10px;border:1px solid var(--line);border-radius:8px;direction:ltr">
        <label style="font-weight:700">ناوی هەژمار</label>
        <input name="facebookHandle" value="${c.facebookHandle}" style="width:100%;padding:10px;margin:4px 0 10px;border:1px solid var(--line);border-radius:8px">
        <label style="font-weight:700">ئیمەیڵ</label>
        <input name="email" value="${c.email}" style="width:100%;padding:10px;margin:4px 0 10px;border:1px solid var(--line);border-radius:8px;direction:ltr">
        <label style="font-weight:700">شوێن</label>
        <input name="location" value="${c.location}" style="width:100%;padding:10px;margin:4px 0 10px;border:1px solid var(--line);border-radius:8px">
        <label style="font-weight:700">Google Maps query</label>
        <input name="mapQuery" value="${c.mapQuery}" style="width:100%;padding:10px;margin:4px 0 10px;border:1px solid var(--line);border-radius:8px;direction:ltr">
        <button class="btn">پاشەکەوت</button>
      </form>`);
        document.getElementById("cf").addEventListener("submit", (e) => {
          e.preventDefault();
          const fd = new FormData(e.target);
          const obj = {}; for (const [k, v] of fd) obj[k] = v;
          window.SA.contact = obj;
          const ov = JSON.parse(localStorage.getItem("sa_data_overlay") || "{}");
          ov.contact = obj;
          localStorage.setItem("sa_data_overlay", JSON.stringify(ov));
          location.reload();
        });
      });
    }
    // Allow contact info to be edited via data.js (falls back to defaults)
    const C = window.SA.contact || {
      facebook: "https://facebook.com/seriaay",
      facebookHandle: "@seriaay",
      email: "contact@seriaay.com",
      location: "هەولێر — کوردستان",
      mapQuery: "Erbil,Kurdistan"
    };
    document.getElementById("fb-card").href = C.facebook;
    document.getElementById("fb-handle").textContent = C.facebookHandle;
    document.getElementById("mail-card").href = "mailto:" + C.email;
    document.getElementById("mail-addr").textContent = C.email;
    document.getElementById("loc-text").textContent = C.location;
    document.getElementById("map").src = `https://www.google.com/maps?q=${encodeURIComponent(C.mapQuery)}&output=embed`;
    });
  </script>
</body>

</html>
